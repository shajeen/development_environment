<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevEnvOps Terminal</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #282c34;
            color: #abb2bf;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            padding: 20px;
        }
        .terminal-container {
            background-color: #21252b;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .terminal-output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 10px;
            border-bottom: 1px solid #3e4451;
            padding-bottom: 10px;
        }
        .terminal-input-group {
            display: flex;
        }
        .terminal-input {
            background-color: #3e4451;
            color: #abb2bf;
            border: 1px solid #5c6370;
            border-radius: 4px;
            padding: 8px 12px;
            flex-grow: 1;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        }
        .terminal-input:focus {
            outline: none;
            border-color: #61afef;
            box-shadow: 0 0 0 0.2rem rgba(97, 175, 239, 0.25);
        }
        .btn-execute {
            background-color: #61afef;
            border-color: #61afef;
            color: white;
            margin-left: 10px;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-execute:hover {
            background-color: #52a0da;
            border-color: #52a0da;
        }
        .prompt {
            color: #98c379; /* Green for prompt */
        }
        .error {
            color: #e06c75; /* Red for errors */
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4" style="color: #61afef;">DevEnvOps Bash Terminal</h2>
        <div class="terminal-container">
            <div class="terminal-output" id="terminal-output">
                <div class="prompt">Welcome to the DevEnvOps Terminal!</div>
                <div class="prompt">Type 'help' for a list of commands.</div>
            </div>
            <div class="terminal-input-group">
                <input type="text" class="form-control terminal-input" id="command-input" placeholder="Enter command...">
                <button class="btn btn-execute" id="execute-button">Execute</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>
    <script>
        $(document).ready(function() {
            var socket = io();
            var terminalOutput = $('#terminal-output');
            var commandInput = $('#command-input');
            var executeButton = $('#execute-button');

            socket.on('connect', function() {
                terminalOutput.append('<div class="prompt">Connected to server.</div>');
                terminalOutput.scrollTop(terminalOutput[0].scrollHeight);
            });

            socket.on('terminal_output', function(data) {
                terminalOutput.append('<div>' + data.output + '</div>');
                terminalOutput.scrollTop(terminalOutput[0].scrollHeight);
            });

            socket.on('command_finished', function(data) {
                if (data.success) {
                    terminalOutput.append('<div class="prompt">Command finished successfully.</div>');
                } else {
                    terminalOutput.append('<div class="error">Command failed.</div>');
                }
                terminalOutput.scrollTop(terminalOutput[0].scrollHeight);
                executeButton.prop('disabled', false);
                commandInput.prop('disabled', false);
                commandInput.focus();
            });

            function executeCommand() {
                var command = commandInput.val();
                if (command.trim() === '') {
                    return;
                }

                executeButton.prop('disabled', true);
                commandInput.prop('disabled', true);
                commandInput.val('');

                socket.emit('execute_command', { command: command });
            }

            executeButton.on('click', executeCommand);

            commandInput.on('keypress', function(e) {
                if (e.which === 13) { // Enter key pressed
                    executeCommand();
                }
            });
        });
    </script>
</body>
</html>
